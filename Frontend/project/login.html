<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Aviation Learning</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav>
      <div class="logo">Aviation Learning</div>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
    </nav>

    <!-- LOGIN SECTION -->
    <div class="login-container">
      <div class="login-box">
        <h2>Welcome Back ✈</h2>
        <p>Login to your account and continue learning</p>

        <form>
          <input type="email" placeholder="Email address" required />
          <input type="password" placeholder="Password" required />

          <div class="options">
            <label><input type="checkbox" /> Remember me<br></label>
            <a href="#" class="forget-link">Forgot Password?</a>
          </div>

          <button type="submit" class="login-btn">Login</button>

          <a href="#">Don’t have an account? Sign up</a>
        </form>
      </div>
    </div>

    <!-- FOOTER -->
    <footer>
      <p>© 2025 Aviation Learning. All rights reserved.</p>
    </footer>
  </body>
</html>
