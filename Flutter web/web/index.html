<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKY Learn – Splash Screen</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      overflow: hidden;
    }

    .splash {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: clamp(24px, 5vw, 60px) clamp(16px, 4vw, 40px);
      position: relative;
      overflow: hidden;
    }

    .mesh-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, #081A36 0%, #0D3260 50%, #081A36 75%, #020810 100%);
      z-index: 0;
    }

    canvas#aurora,
    canvas#stars {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    canvas#stars {
      z-index: 2;
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      flex: 1;
      justify-content: center;
      gap: clamp(12px, 3vw, 24px);
    }

    /* Logo cluster */
    .logo-cluster {
      position: relative;
      width: clamp(140px, 35vw, 180px);
      height: clamp(140px, 35vw, 180px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-outer,
    .ring-mid,
    .badge {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-outer {
      width: 100%;
      height: 100%;
      border: 1px solid rgba(255, 179, 0, 0.12);
      animation: pulse 1.8s ease-in-out infinite alternate;
    }

    .ring-mid {
      width: 86%;
      height: 86%;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .badge {
      width: 72%;
      height: 72%;
      background: radial-gradient(circle, #1E5799 0%, #0D3260 55%, #061428 100%);
      border: 1.5px solid rgba(255, 179, 0, 0.4);
      box-shadow: 0 0 30px rgba(255, 179, 0, 0.3), 0 16px 40px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .badge img {
      width: 115%;
      height: 115%;
      object-fit: cover;
      border-radius: 50%;
    }

    .badge-fallback {
      font-size: clamp(32px, 8vw, 48px);
      color: #FFB300;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    /* Orbit */
    .orbit-ring {
      position: absolute;
      width: calc(2 * clamp(70px, 17.5vw, 90px) + 20px);
      height: calc(2 * clamp(70px, 17.5vw, 90px) + 20px);
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.04);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .orbit-dot,
    .orbit-dot2 {
      position: absolute;
      border-radius: 50%;
      top: 50%;
      left: 50%;
    }

    .orbit-dot {
      width: 5px;
      height: 5px;
      background: rgba(255, 179, 0, 0.7);
      margin-top: -2.5px;
      margin-left: calc(-1 * clamp(70px, 17.5vw, 90px) - 2.5px);
      transform-origin: clamp(70px, 17.5vw, 90px) 2.5px;
      animation: orbitRotate 10s linear infinite;
    }

    .orbit-dot2 {
      width: 3px;
      height: 3px;
      background: rgba(255, 255, 255, 0.35);
      margin-top: -1.5px;
      margin-left: calc(-1 * clamp(70px, 17.5vw, 90px) - 1.5px);
      transform-origin: clamp(70px, 17.5vw, 90px) 1.5px;
      animation: orbitRotate 10s linear infinite reverse;
    }

    /* Letters */
    .letters-row {
      display: flex;
      gap: clamp(1px, 0.5vw, 4px);
      justify-content: center;
      align-items: center;
    }

    .letter {
      font-size: clamp(28px, 8vw, 44px);
      font-weight: 900;
      color: #FFB300;
      letter-spacing: 2px;
      text-shadow: 0 0 22px rgba(255, 179, 0, 0.55);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.33, 1, 0.68, 1);
      display: inline-block;
    }

    .letter.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Divider */
    .divider {
      width: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255, 179, 0, 0.8), transparent);
      transition: width 0.4s ease;
      max-width: 45vw;
    }

    /* Subtitle */
    .subtitle-main {
      font-size: clamp(13px, 3.5vw, 18px);
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.3px;
      text-align: center;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.33, 1, 0.68, 1);
    }

    .subtitle-main.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Tagline */
    .tagline {
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.4s ease;
      width: 100%;
    }

    .tagline.visible {
      opacity: 1;
    }

    .tagline-dash {
      width: 24px;
      height: 1px;
      background: rgba(255, 179, 0, 0.5);
      flex-shrink: 0;
    }

    .tagline-text {
      font-size: clamp(10px, 2.5vw, 12px);
      letter-spacing: 1.4px;
      font-weight: 500;
      color: rgba(255, 179, 0, 0.85);
      text-align: center;
      flex: 1;
    }

    /* Loader */
    .loader-wrap {
      opacity: 0;
      transition: opacity 0.4s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding-bottom: clamp(16px, 4vw, 32px);
    }

    .loader-wrap.visible {
      opacity: 1;
    }

    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
       margin-top: 160px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #FFB300;
      opacity: 0.3;
      animation: dotWave 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    .version {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 1.5px;
      
    }

    /* Exit */
    .splash.exiting {
  animation: exitAnim 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes exitAnim {
  0%   { opacity: 1; transform: scale(1) translateY(0); filter: blur(0px); }
  100% { opacity: 0; transform: scale(1.08) translateY(-20px); filter: blur(8px); }
}

    @keyframes orbitRotate {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes dotWave {

      0%,
      100% {
        opacity: 0.3;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.3);
        box-shadow: 0 0 6px rgba(255, 179, 0, 0.6);
      }
    }

    @keyframes exitAnim {
      from {
        opacity: 1;
        transform: scale(1);
      }

      to {
        opacity: 0;
        transform: scale(1.15);
      }
    }

    @media (max-width: 380px) {
      .letter {
        font-size: 24px;
      }

      .subtitle-main {
        font-size: 12px;
      }
    }

    @media (min-width: 768px) {
      .content {
        gap: 28px;
      }
    }
  </style>
</head>
<script src="flutter_bootstrap.js" async></script>


<body>

  <div class="splash" id="splash">
    <div class="mesh-bg"></div>
    <canvas id="aurora"></canvas>
    <canvas id="stars"></canvas>

    <div class="content">

      <!-- Logo cluster -->
      <div class="logo-cluster" id="logoCluster" style="opacity:0; transform:scale(0.5);
                transition: opacity 0.4s ease, transform 0.7s cubic-bezier(0.34,1.56,0.64,1);">
        <div class="orbit-ring"></div>
        <div class="orbit-dot"></div>
        <div class="orbit-dot2"></div>
        <div class="ring-outer"></div>
        <div class="ring-mid"></div>
        <div class="badge">
          <!-- Replace src with your actual image path, e.g. assets/images/cougar_img.png -->
          <img src="assets/images/cougar_app.png"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" alt="SKY Learn Logo" />
          <div class="badge-fallback" style="display:none;">✈</div>
        </div>
      </div>

      <!-- SKY_LEARN letters (letter-by-letter) -->
      <div class="letters-row">
        <span class="letter" data-i="0">S</span>
        <span class="letter" data-i="1">K</span>
        <span class="letter" data-i="2">Y</span>
        <span class="letter" data-i="3" style="font-size:clamp(20px,5vw,28px);">_</span>
        <span class="letter" data-i="4">L</span>
        <span class="letter" data-i="5">e</span>
        <span class="letter" data-i="6">a</span>
        <span class="letter" data-i="7">r</span>
        <span class="letter" data-i="8">n</span>
      </div>

      <!-- Animated divider -->
      <div class="divider" id="divider"></div>

      <!-- Subtitle -->
      <p class="subtitle-main" id="subtitleMain">
        Aviation Training · Aviation Solutions
      </p>

      <!-- Tagline -->
      <div class="tagline" id="tagline">
        <div class="tagline-dash"></div>

        <span class="tagline-text">LMS – Egypt · Egyption Military Academy</span>
        <div class="tagline-dash"></div>

      </div>

      <!-- Loader + version -->
      <div class="loader-wrap" id="loaderWrap">
        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <span class="version">v1.0.0</span>
      </div>

    </div>
  </div>

  <script>
    (function () {
      var W = window.innerWidth;
      var H = window.innerHeight;

      /* ── Seeded random (same logic as Flutter _StarPainter) ── */
      function mulberry32(a) {
        return function () {
          a |= 0; a = a + 0x6D2B79F5 | 0;
          var t = Math.imul(a ^ a >>> 15, 1 | a);
          t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
          return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
      }

      /* ── Stars ── */
      var sc = document.getElementById('stars');
      sc.width = W; sc.height = H;
      var sx = sc.getContext('2d');
      var stars = [];
      for (var i = 0; i < 80; i++) {
        var r = mulberry32(i * 31 + 7);
        stars.push({ x: r() * W, y: r() * H, rad: r() * 1.2 + 0.3, op: r() * 0.6 + 0.2 });
      }
      stars.forEach(function (s) {
        sx.beginPath();
        sx.arc(s.x, s.y, s.rad, 0, Math.PI * 2);
        sx.fillStyle = 'rgba(255,255,255,' + s.op + ')';
        sx.fill();
      });

      /* ── Aurora ── */
      var ac = document.getElementById('aurora');
      ac.width = W; ac.height = H;
      var ax = ac.getContext('2d');
      var auroraT = 0;

      function blob(cx, cy, rr, color) {
        var grd = ax.createRadialGradient(cx * W, cy * H, 0, cx * W, cy * H, rr * Math.max(W, H));
        grd.addColorStop(0, color);
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        ax.fillStyle = grd;
        ax.fillRect(0, 0, W, H);
      }

      function drawAurora() {
        ax.clearRect(0, 0, W, H);
        var s = auroraT * 2 * Math.PI;
        blob(0.5 + Math.cos(s) * 0.35, 0.4 + Math.sin(s * 0.7) * 0.2, 0.7, 'rgba(255,179,0,0.07)');
        blob(0.3 + Math.sin(s * 0.8) * 0.3, 0.6 + Math.cos(s * 0.5) * 0.25, 0.5, 'rgba(30,87,153,0.15)');
        auroraT += 1 / (60 * 6);
        requestAnimationFrame(drawAurora);
      }
      drawAurora();

      /* ── Animation sequence ── */
      var logo = document.getElementById('logoCluster');
      var letters = document.querySelectorAll('.letter');
      var divider = document.getElementById('divider');
      var subtitle = document.getElementById('subtitleMain');
      var tagline = document.getElementById('tagline');
      var loaderWrap = document.getElementById('loaderWrap');

      function setDividerWidth() {
        divider.style.width = Math.min(window.innerWidth * 0.45, 200) + 'px';
      }

      // 1. Logo
      setTimeout(function () {
        logo.style.opacity = '1';
        logo.style.transform = 'scale(1)';
      }, 200);

      // 2. Letters (staggered 130 ms)
      setTimeout(function () {
        letters.forEach(function (l, i) {
          setTimeout(function () { l.classList.add('visible'); }, i * 130);
        });
      }, 900);

      // 3. Divider
      setTimeout(function () { setDividerWidth(); }, 1600);

      // 4. Subtitle
      setTimeout(function () { subtitle.classList.add('visible'); }, 1700);

      // 5. Tagline
      setTimeout(function () { tagline.classList.add('visible'); }, 1900);

      // 6. Loader
      setTimeout(function () { loaderWrap.classList.add('visible'); }, 2200);

      // 7. Exit (after 3.8 s total — same as Flutter 3-second delay + 0.8 s buffer)
      window.addEventListener('resize', setDividerWidth);

      // Exit: انتظر Flutter يكون جاهز فعلاً زي ما الكود القديم كان بيعمل
      window.addEventListener('flutter-first-frame', function () {
        var splash = document.getElementById('splash');
        if (!splash) return;
        splash.classList.add('exiting');
        setTimeout(function () {
          splash.style.display = 'none';
        }, 700);
      });
    })();
    
  </script>
  <script src="flutter_bootstrap.js" async></script>

</body>


</html>
